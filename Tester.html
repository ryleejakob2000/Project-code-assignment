<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breath of the Wild Lore: Characters</title>
    <link rel="stylesheet" href="Tester.css">
</head>

<body>

<main>
<div class="slideshow">

    <div class="slide active">
        <img src="princess Zelda.webp">
        <p class="caption">Princess Zelda is the Hylian Princess of Hyrule, she holds the triforce of Wisdom</p>
    </div>

    <div class="slide">
        <img src="Link.webp">
        <p class="caption">Link</p>
    </div>

    <div class="slide">
        <img src="Urbosa.png">
        <p class="caption">Urbosa</p>
    </div>

    <div class="slide">
        <img src="revali.png">
        <p class="caption">Revali</p>
    </div>

    <div class="slide">
        <img src="Daruk.webp">
        <p class="caption">Daruk</p>
    </div>

    <div class="slide">
        <img src="mipha.png">
        <p class="caption">Mipha is </p>
    </div>

    <!-- Arrows -->
    <button class="arrow left" onclick="prevSlide()">&#10094;</button>
    <button class="arrow right" onclick="nextSlide()">&#10095;</button>

</div>

<script>
let current = 0;
const slides = document.querySelectorAll('.slide');

function showSlide(n) {
    slides[current].classList.remove('active');
    current = (n + slides.length) % slides.length;
    slides[current].classList.add('active');
}

function nextSlide() { showSlide(current + 1); }
function prevSlide() { showSlide(current - 1); }
</script>


</main>

<footer></footer>

</body>

</body>
